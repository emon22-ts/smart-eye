name: Smart Eye CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-tests:
    name: Backend Tests (Python 3.9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install CI deps (no TF/dlib)
        run: pip install -r requirements-ci.txt
      - name: Fuzzy engine self-test
        run: python smart_eye/domain/fuzzy_engine.py
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Schema import check
        run: python -c "import smart_eye.schemas; print(chr(10)+'schemas OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

  frontend-build:
    name: Frontend Build (Node 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Verify
        run: test -f frontend/dist/index.html && echo "Build OK"

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: pip install flake8
      - name: Flake8 errors only
        run: flake8 smart_eye/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=smart_eye/tests/
