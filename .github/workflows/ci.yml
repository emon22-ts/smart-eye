name: Smart Eye CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-tests:
    name: Backend Tests (Python 3.9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install scikit-learn
        run: pip install "scikit-learn>=1.3,<1.4"

      - name: Run backend test suite
        run: python -m pytest smart_eye/tests/ -q --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run fuzzy engine self-test
        run: python smart_eye/domain/fuzzy_engine.py
        env:
          PYTHONPATH: ${{ github.workspace }}

  frontend-build:
    name: Frontend Build Check (Node 18)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build

      - name: Check build output exists
        run: |
          ls frontend/dist/
          test -f frontend/dist/index.html && echo "index.html present"

  lint-python:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (errors only)
        run: |
          flake8 smart_eye/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
